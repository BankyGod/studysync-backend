openapi: 3.0.3
info:
  title: StudySync API
  description: Backend API for the StudySync collaborative learning platform.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development
tags:
  - name: Auth
  - name: Onboarding
  - name: Users
  - name: Matching
  - name: Workspaces
  - name: Notifications
  - name: Admin
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, instructor]
        studentId:
          type: string
        university:
          type: string
        program:
          type: string
        level:
          type: string
          enum: ['100', '200', '300', '400']
        phone:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    RegisterRequest:
      type: object
      required: [firstName, lastName, studentId, email, university, program, level, role, password]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        studentId:
          type: string
        email:
          type: string
        phone:
          type: string
        university:
          type: string
        program:
          type: string
        level:
          type: string
          enum: ['100', '200', '300', '400']
        role:
          type: string
          enum: [student, instructor]
        password:
          type: string
          minLength: 8
        agreeToTerms:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    OnboardingProfile:
      type: object
      properties:
        learningStyle:
          type: string
          enum: [visual, auditory, reading, kinesthetic]
        availability:
          type: array
          maxItems: 5
          items:
            type: string
            example: Mon-8 AM
        courses:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              subject:
                type: string
              courseNumber:
                type: string
        studyPreferences:
          type: object
          properties:
            groupSize:
              type: string
              enum: [small, medium, large]
            timeCommitment:
              type: string
              enum: [low, medium, high]
            difficulty:
              type: string
              enum: [beginner, intermediate, advanced]
        savedAt:
          type: string
          format: date-time
    UserDisplayProfile:
      type: object
      properties:
        fullName:
          type: string
        studentRole:
          type: string
        primaryUniversity:
          type: string
        secondaryUniversity:
          type: string
        email:
          type: string
        location:
          type: string
        updatedAt:
          type: string
          format: date-time
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        dueDate:
          type: string
          format: date
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date
        variant:
          type: string
          enum: [default, highlight, completed]
        createdBy:
          type: object
          properties:
            id:
              type: string
            initials:
              type: string
            name:
              type: string
            color:
              type: string
        pendingRegressRequest:
          type: object
          properties:
            requestId:
              type: string
            requesterId:
              type: string
            fromStatus:
              type: string
            targetStatus:
              type: string
            createdAt:
              type: string
              format: date-time
        assignee:
          type: object
          properties:
            id:
              type: string
            initials:
              type: string
            name:
              type: string
            color:
              type: string
        createdAt:
          type: string
          format: date-time
    KanbanBoard:
      type: object
      properties:
        todo:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        in_progress:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        completed:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        message:
          type: string
        groupId:
          type: string
        taskId:
          type: string
        actorId:
          type: string
        read:
          type: boolean
        readAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
    Reliability:
      type: object
      properties:
        score:
          type: integer
          nullable: true
          description: 0-100 when at least 3 assigned tasks are scored; otherwise null
        tasksScored:
          type: integer
        label:
          type: string
          example: Reliable
        scope:
          type: string
          enum: [group, global]
        groupId:
          type: string
          description: Present when scope is group
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email or student ID already exists
  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /onboarding/profile:
    get:
      tags: [Onboarding]
      summary: Get onboarding profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProfile'
        '404':
          description: Not started
    post:
      tags: [Onboarding]
      summary: Save onboarding profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingProfile'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProfile'
  /users/me/profile:
    get:
      tags: [Users]
      summary: Get display profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDisplayProfile'
    put:
      tags: [Users]
      summary: Update display profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDisplayProfile'
      responses:
        '200':
          description: Updated
  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload profile photo (multipart field photo, max 5MB)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns avatarUrl
    delete:
      tags: [Users]
      summary: Remove profile photo
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Removed
  /users/{userId}/avatar:
    get:
      tags: [Users]
      summary: Stream profile photo (self or shared group member)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Image stream
  /users/me/groups:
    get:
      tags: [Users]
      summary: List user's study groups (dashboard)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /users/me/reliability:
    get:
      tags: [Users]
      summary: Get your reliability score
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: query
          description: Workspace slug for pod-scoped score (e.g. biology-101)
          schema:
            type: string
      responses:
        '200':
          description: Reliability score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reliability'
  /users/{userId}/reliability:
    get:
      tags: [Users]
      summary: Get a member's reliability score (shared group required)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: groupId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Reliability score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reliability'
  /users/{userId}/profile:
    get:
      tags: [Users]
      summary: View another member's profile (shared group required)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public pod profile (no email for other users)
        '403':
          description: Not in a shared study group
  /matching/find-group:
    post:
      tags: [Matching]
      summary: Start matching for a study group (blocked if already in a group for that course)
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Matching job started or completed
        '409':
          description: Already in a group for this course
  /matching/groups/{groupId}/join:
    post:
      tags: [Matching]
      summary: Join a specific study group (leave current group for that course first)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Joined group
        '409':
          description: Already in a group for this course
  /matching/groups/{groupId}/leave:
    delete:
      tags: [Matching]
      summary: Leave a study group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Left group
  /matching/jobs/{jobId}:
    get:
      tags: [Matching]
      summary: Poll matching job progress
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
  /matching/course/{courseCode}:
    get:
      tags: [Matching]
      summary: List groups for a course
      security:
        - bearerAuth: []
      parameters:
        - name: courseCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /workspaces/{groupId}:
    get:
      tags: [Workspaces]
      summary: Workspace metadata and members
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /workspaces/{groupId}/tasks:
    get:
      tags: [Workspaces]
      summary: Kanban board
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KanbanBoard'
    post:
      tags: [Workspaces]
      summary: Create task
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                dueDate:
                  type: string
                assigneeId:
                  type: string
      responses:
        '201':
          description: Created
  /workspaces/{groupId}/tasks/{taskId}:
    patch:
      tags: [Workspaces]
      summary: Update or move task
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated
    delete:
      tags: [Workspaces]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Only the task creator can delete
  /workspaces/{groupId}/tasks/reorder:
    put:
      tags: [Workspaces]
      summary: Reorder or move tasks (backward moves by non-creators return 409 REGRESS_REQUIRES_APPROVAL)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated board
  /workspaces/{groupId}/tasks/{taskId}/progress:
    post:
      tags: [Workspaces]
      summary: Assignee marks task started or complete (auto-moves column)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [start, complete]
      responses:
        '200':
          description: Updated task
  /workspaces/{groupId}/tasks/{taskId}/regress-requests:
    post:
      tags: [Workspaces]
      summary: Request creator approval to move a task to an earlier column
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetStatus]
              properties:
                targetStatus:
                  type: string
                  enum: [todo, in_progress]
      responses:
        '201':
          description: Request created; creator notified
  /workspaces/{groupId}/tasks/{taskId}/regress-requests/{requestId}/approve:
    post:
      tags: [Workspaces]
      summary: Approve a regress request (creator only)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approved; all pod members notified
  /workspaces/{groupId}/tasks/{taskId}/regress-requests/{requestId}/reject:
    post:
      tags: [Workspaces]
      summary: Reject a regress request (creator only)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rejected; requester notified
  /users/me/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
        - name: groupId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Notification list with unreadCount and nextCursor
  /users/me/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated count
  /users/me/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Unread notification count
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /users/me/notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Mark one notification read or unread
      security:
        - bearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated notification
  /workspaces/{groupId}/messages:
    get:
      tags: [Workspaces]
      summary: List chat messages
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      tags: [Workspaces]
      summary: Send message (text, attachment, or voice)
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [text]
                content:
                  type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [attachment, voice]
                file:
                  type: string
                  format: binary
                durationSec:
                  type: integer
      responses:
        '201':
          description: Created
  /workspaces/{groupId}/files:
    get:
      tags: [Workspaces]
      summary: List shared files
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      tags: [Workspaces]
      summary: Upload shared file
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
  /workspaces/{groupId}/sessions:
    get:
      tags: [Workspaces]
      summary: List scheduled sessions
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      tags: [Workspaces]
      summary: Schedule a session
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
  /admin/cohorts:
    get:
      tags: [Admin]
      summary: List cohorts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      tags: [Admin]
      summary: Create cohort
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /admin/seed:
    post:
      tags: [Admin]
      summary: Seed cohort students (admin only)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /admin/matching/run:
    post:
      tags: [Admin]
      summary: Run batch matching
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Started
  /admin/groups:
    get:
      tags: [Admin]
      summary: List all groups
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /admin/students:
    get:
      tags: [Admin]
      summary: List students
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
